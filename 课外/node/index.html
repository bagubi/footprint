<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            text-align: center;
            font-family: "微软雅黑", sans-serif;
            background: #ffe6f0;
            padding-top: 50px;
        }

        h1 {
            color: #ff69b4;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <h1>宝贝！想我了没</h1>
    <button onclick="alert('亲亲')">想！</button>
</body>

</html>
