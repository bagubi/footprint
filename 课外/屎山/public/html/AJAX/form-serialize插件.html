<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form-serialize</title>
</head>

<body>
    <h3>form-serialize 插件</h3>
    <P>作用：快速收集表单元素的值,把值变成一个对象</P>
    <form class="example-form">
        <input type="text" name="uname" placeholder="请输入用户名">
        <input type="password" name="pwd" placeholder="请输入密码">
        <input type="submit" class="btn" value="提交">
    </form>
    <!-- 引入form-serialize插件 -->
    <script src="https://cdn.jsdelivr.net/npm/form-serialize@0.7.2/serialize.min.js"></script>
    <script>
        //语法：
        // const form = document.querySelector('.example-form');
        // const data = serialize(form, { hash: true, empty: true });
        //目标：在点击提交，使用form-serialize插件快速收集表单元素的值
        // 1.引入form-serialize插件
        // import serialize from 'form-serialize';
        document.querySelector('.btn').addEventListener('click', () => {
            // 2.使用serialize函数收集表单元素的值
            // 参数1：要获取哪个表单的数据
            // 表单元素设置name属性，值会作为对象的属性名
            // 建议name属性的值与数据库的字段名一致
            // 参数2：配置对象
            //hash 设置获取数据结构
            //  -  true: JS对象（推荐）一般请求体里提交给服务器
            //  -  false: JS数组
            //empty 设置是否忽略空值
            //  -  true: 忽略空值（推荐）数据结构和标签结构一致
            //  -  false: 不忽略空值

        })
    </script>
</body>

</html>
