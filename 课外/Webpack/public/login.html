<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户登录</title>
    //17.CDN
    <% if (htmlWebpackPlugin.options.useCdn) { %>
        <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.3.6/axios.min.js"></script>
        <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"></script>
        <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet">
        <% } %>
</head>

<body>
    <div class="login-container">
        <h2>用户登录</h2>
        <form id="loginForm">
            <input type="text" id="phone" placeholder="手机号" required />
            <input type="password" id="password" placeholder="密码" required />
            <button type="submit">登录</button>
        </form>
    </div>
    <div class="alert"></div>
</body>

</html>
